name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dev environment
        run: uv sync --group dev --python ${{ matrix.python-version }}

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Tests
        run: uv run pytest -q

      - name: Mypy (advisory)
        run: uv run mypy src/ || true

  integration:
    # Live end-to-end scan against tests/fixtures/vuln_app. Heavier than
    # the unit suite (~10s incl. Flask startup) so we only run it on
    # main and on PRs that explicitly opt in via the "integration" label.
    name: integration (vuln_app)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || contains(github.event.pull_request.labels.*.name, 'integration')
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Sync dev environment
        run: uv sync --group dev --python 3.12

      - name: Integration tests
        run: uv run pytest -m slow tests/integration/
